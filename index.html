<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بدير وسيم</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
scroll-behavior:smooth;
}

nav{
position:fixed;
top:0;
width:100%;
background:#000;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
font-weight:bold;
}

nav a:hover{
color:gold;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

header h1{
font-size:55px;
margin-bottom:15px;
}

header p{
font-size:20px;
color:#ccc;
}

section{
padding:80px 20px;
max-width:900px;
margin:auto;
}

h2{
color:gold;
margin-bottom:20px;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:15px;
margin-top:20px;
}
</style>

</head>
<body>

<nav>
<a href="#home">الرئيسية</a>
<a href="#about">من أنا</a>
<a href="#poems">قصائدي</a>
<a href="#novels">رواياتي</a>
<a href="#contact">تواصل</a>
</nav>

<header id="home">
<h1>بدير وسيم</h1>
<p>كاتب وشاعر جزائري</p>
</header>

<section id="about">
<h2>من أنا</h2>
<div class="card">
أنا بدير وسيم، كاتب وشاعر جزائري، أؤمن بأن الكلمات تستطيع أن تعيش أكثر من أصحابها.
</div>
</section>

<section id="poems">
<h2>قصائدي</h2>
<div class="card">
ستُعرض هنا جميع قصائدي.
</div>
</section>

<section id="novels">
<h2>رواياتي</h2>
<div class="card">
ستُعرض هنا جميع رواياتي.
</div>
</section>

<section id="contact">
<h2>تواصل معي</h2>
<div class="card">
البريد الإلكتروني سيضاف لاحقًا.
</div>
</section>

</body>
</html>

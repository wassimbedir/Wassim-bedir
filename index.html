<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بدير وسيم</title>


  <style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
scroll-behavior:smooth;
}

nav{
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:15px;
background:#000;
padding:15px;
}

nav a{
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
padding:8px 12px;
}

nav a:hover{
color:gold;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

header h1{
font-size:55px;
margin-bottom:15px;
}

    #themeBtn{
position:fixed;
top:20px;
left:20px;
padding:10px 15px;
border:none;
border-radius:50px;
background:#d4af37;
color:black;
font-size:20px;
cursor:pointer;
z-index:1000;
}

.light-mode{
background:white;
color:black;
}

.light-mode nav{
background:#f5f5f5;
}

.light-mode nav a{
color:black;
}

.light-mode .card{
background:#ececec;
color:black;
}
header p{
font-size:20px;
color:#ccc;
}

section{
padding:80px 20px;
max-width:900px;
margin:auto;
}

h2{
color:gold;
margin-bottom:20px;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:15px;
margin-top:20px;
}
</style>

</head>
<body>

<nav>
<a href="#home">الرئيسية</a>
<a href="#about">من أنا</a>
<a href="#poems">قصائدي</a>
<a href="#novels">رواياتي</a>
<a href="#contact">تواصل</a>
</nav>

<header id="home">
<h1>بدير وسيم</h1>
<p>كاتب وشاعر جزائري</p>
</header>

<section id="about">
<h2>من أنا</h2>
<div class="card">
أنا بدير وسيم، كاتب وشاعر جزائري، أؤمن بأن الكلمات تستطيع أن تعيش أكثر من أصحابها.
</div>
</section>

<section id="poems">
<h2>قصائدي</h2>
<div class="card">
ستُعرض هنا جميع قصائدي.
</div>
</section>

<section id="novels">
<h2>رواياتي</h2>
<div class="card">
ستُعرض هنا جميع رواياتي.
</div>
</section>

<section id="contact">
<h2>تواصل معي</h2>
<div class="card">
البريد الإلكتروني سيضاف لاحقًا.
</div>
</section>

<button id="themeBtn" onclick="toggleTheme()">🌙</button>

<script>
function toggleTheme() {
  document.body.classList.toggle("light-mode");

  let btn = document.getElementById("themeBtn");

  if (document.body.classList.contains("light-mode")) {
    btn.innerHTML = "☀️";
    localStorage.setItem("theme", "light");
  } else {
    btn.innerHTML = "🌙";
    localStorage.setItem("theme", "dark");
  }
}

if (localStorage.getItem("theme") == "light") {
  document.body.classList.add("light-mode");
  document.getElementById("themeBtn").innerHTML = "☀️";
}
</script>
</body>
</html>

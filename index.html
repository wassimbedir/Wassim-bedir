<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بدير وسيم</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Amiri',serif;
background:
radial-gradient(circle at top,#3d2b09 0%,transparent 35%),
linear-gradient(180deg,#050505,#0d1117,#171717);
color:#fff;
scroll-behavior:smooth;
overflow-x:hidden;
}

nav{
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:5px;
background:#000;
padding:10px;
}
nav a{
color:white;
text-decoration:none;
margin:6px;
font-size:14px;
font-weight:bold;
padding:6px 8px;
}

nav a:hover{
color:gold;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

header h1{
font-family:'Cinzel',serif;
font-size:72px;
color:#d4af37;
margin-bottom:20px;
letter-spacing:3px;
text-shadow:0 0 18px rgba(212,175,55,.45);
}

    #themeBtn{
position:fixed;
top:20px;
left:20px;
padding:10px 15px;
border:none;
border-radius:50px;
background:#d4af37;
color:black;
font-size:20px;
cursor:pointer;
z-index:1000;
}

.light-mode{
background:white;
color:black;
}

.light-mode nav{
background:#f5f5f5;
}

.light-mode nav a{
color:black;
}

.light-mode .card{
background:#ececec;
color:black;
}
header p{
font-size:28px;
color:#ddd;
line-height:1.8;
max-width:700px;
padding:0 20px;
}

section{
padding:80px 20px;
max-width:900px;
margin:auto;
}

h2{
color:gold;
margin-bottom:20px;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:15px;
margin-top:20px;
}
</style>

</head>
<body>

<nav>
<a href="index.html">الرئيسية</a>
<a href="about.html">من أنا</a>
<a href="poems.html">قصائدي</a>
<a href="novels.html">رواياتي</a>
<a href="contact.html"> تواصل معي</a>
</nav>

<header id="home">
<h1>بدير وسيم</h1>
<p>كاتبٌ وشاعرٌ جزائري، أؤمن أن الكلمة الصادقة تبقى حين يرحل أصحابها.</p>
</header>

<button id="themeBtn" onclick="toggleTheme()">🌙</button>

<script>
function toggleTheme() {
  document.body.classList.toggle("light-mode");

  let btn = document.getElementById("themeBtn");

  if (document.body.classList.contains("light-mode")) {
    btn.innerHTML = "☀️";
    localStorage.setItem("theme", "light");
  } else {
    btn.innerHTML = "🌙";
    localStorage.setItem("theme", "dark");
  }
}

if (localStorage.getItem("theme") == "light") {
  document.body.classList.add("light-mode");
  document.getElementById("themeBtn").innerHTML = "☀️";
}
</script>
</body>
</html>

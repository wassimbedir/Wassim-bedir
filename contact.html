*{

padding:0;

}

body{

background:
radial-gradient(circle at top,#3d2b09 0%,transparent 35%),
linear-gradient(180deg,#050505,#0d1117,#171717);

overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:radial-gradient(white 1px,transparent 1px);

z-index:-1;
}

nav{

justify-content:center;

padding:18px;
background:rgba(20,20,20,.55);
backdrop-filter:blur(12px);

}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
padding:10px 18px;

transition:.3s;
}

nav a:hover{
background:#d4af37;
color:#111;
}

.container{
max-width:900px;
margin:70px auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(212,175,55,.25);
border-radius:25px;
padding:50px 30px;
text-align:center;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(212,175,55,.1);
}

h1{
font-family:'Cinzel',serif;
font-size:55px;
color:#d4af37;
margin-bottom:50px;
text-shadow:0 0 15px rgba(212,175,55,.4);
}

.info{
margin:45px 0;
}

.icon{
font-size:40px;
margin-bottom:15px;
}

.contact-link{
display:block;
font-size:28px;
font-weight:bold;
color:#d4af37;
text-decoration:none;
text-align:center;
word-break:break-word;
transition:.3s;
}

.contact-link:hover{
color:white;
text-shadow:0 0 12px rgba(212,175,55,.5);
}

.footer{
margin-top:50px;
font-size:24px;
line-height:2;
color:#ddd;
}

@media(max-width:768px){

h1{
font-size:42px;
}

.contact-link{
font-size:22px;
}

.footer{
font-size:20px;
}

}
